services:
  svarnas-coaching-db-v5:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - svarnas-coaching-pg-v5:/var/lib/postgresql/data
    networks:
      - coaching-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  svarnas-coaching-pg-v5:

networks:
  coaching-net:
