weeks:
- week_number: 1
  theme: "General Phase Begins"
  week_notes: >
    Start these progression runs extremely easy. Focus on running fast but relaxed.

  workouts:
  - workout_id: w01_01
    order_in_week: 1
    importance: 3
    title: "Kenyan-Style Progression"
    category: base
    session_rpe: 7
    surface: road
    workout_notes: >
      Start extremely easy and build gradually. Focus on running fast but relaxed in the latter half.
    blocks:
    - type: progression
      distance_m: 8000
      intensity:
        base: easy_pace
        modifier: neutral
      internal_note: >
        Kenyan-style progression (easy â†’ moderate).
    - type: cooldown
      distance_m: 1000
      intensity: easy_pace

  - workout_id: w01_02
    order_in_week: 2
    importance: 5
    title: "Easy Run with Strides"
    category: base
    session_rpe: 3
    surface: road
    workout_notes: >
      Easy run. Strides are about smoothness and efficiency â€” not sprints.
    blocks:
    - type: steady
      distance_m: { min: 6000, max: 7000 }
      intensity: easy_pace
    - type: repeats
      reps: 4
      steps:
      - type: active
        duration_min: 0.33
        intensity:
          base: 5k_pace
          modifier: strong
      - type: recovery
        duration_min: 0.67
        intensity: easy_pace

  - workout_id: w01_03
    order_in_week: 3
    importance: 2
    title: "Interval Run"
    category: intervals
    session_rpe: 7.5
    surface: track
    workout_notes: >
      Good initial check of your current fitness estimate. Pace the reps evenly.
    blocks:
    - type: warmup
      distance_m: 2000
      intensity: easy_pace
      internal_note: >
        Progressive warm-up + add 4Ã—20" strides within the warm-up.
    - type: repeats
      reps: 10
      steps:
      - type: active
        duration_min: 1.5
        intensity:
          base: 5k_pace
          pct: 1.00
      - type: recovery
        duration_min: 1
        intensity: recovery_pace
        internal_note: >
          Walk recovery.
    - type: cooldown
      distance_m: 1000
      intensity: easy_pace

  - workout_id: w01_04
    order_in_week: 4
    importance: 6
    title: "Rest or Easy Run"
    category: optional_run
    session_rpe: 2
    surface: road
    workout_notes: >
      Optional. If you feel good, do an easy run. Otherwise, take a full rest day.
    blocks:
    - type: steady
      distance_m: { min: 0, max: 7000 }
      intensity: easy_pace
      internal_note: >
        0m means complete rest.

  - workout_id: w01_05
    order_in_week: 5
    importance: 4
