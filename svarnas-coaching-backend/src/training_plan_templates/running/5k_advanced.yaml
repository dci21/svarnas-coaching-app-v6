template_id: 5k-advanced-sample-template
template_name: "5k advanced Not A Real Training Plan - Should be Generated in the future"
sport: run
target_distance: 5k
levels:
- advanced
peak_weekly_volume_km:
  min: 65
  max: 80
duration_weeks: 6
version: "1.0.0"
created: "2026-02-18"
